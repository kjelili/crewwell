<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CrewWell | Workforce Pulse &amp; Safety Readiness</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #060b14;
  --surface: #0f172a;
  --surface-alt: #111f3d;
  --border: #23365e;
  --text: #e5ecff;
  --text-muted: #b6c2e5;
  --brand: #41d1ff;
  --brand-strong: #17aee0;
  --danger: #ff5d5d;
  --success: #22c55e;
  --shadow: 0 14px 35px rgba(0, 0, 0, 0.28);

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;
  --space-7: 3rem;

  --radius-sm: 0.5rem;
  --radius-md: 0.9rem;
  --radius-lg: 1.2rem;
}

*, *::before, *::after { box-sizing: border-box; }

html, body { margin: 0; min-height: 100%; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background:
    radial-gradient(1200px 500px at 10% -10%, #103e69 0%, transparent 52%),
    radial-gradient(900px 400px at 90% 0%, #0f3853 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  line-height: 1.55;
}

#app { min-height: 100svh; }

.page {
  width: min(1120px, 100% - var(--space-6));
  margin: 0 auto;
  padding: var(--space-7) 0;
  display: grid;
  gap: var(--space-6);
}

/* ── User Bar ── */

.user-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: linear-gradient(170deg, rgba(17, 31, 61, 0.9) 0%, rgba(15, 23, 42, 0.98) 100%);
  flex-wrap: wrap;
}

.user-bar-left {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.user-bar-name {
  font-weight: 700;
  font-size: 0.95rem;
}

.user-bar-right {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.locale-control-inline select {
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  min-width: 100px;
}

.role-badge {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.role-badge.role-manager {
  background: rgba(65, 209, 255, 0.18);
  color: var(--brand);
  border: 1px solid rgba(65, 209, 255, 0.35);
}

.role-badge.role-worker {
  background: rgba(34, 197, 94, 0.15);
  color: var(--success);
  border: 1px solid rgba(34, 197, 94, 0.35);
}

.privacy-badge {
  font-size: 0.78rem;
  color: var(--success);
  font-weight: 600;
  padding: 0.3rem 0.7rem;
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 999px;
  background: rgba(34, 197, 94, 0.08);
}

/* ── Auth Screen ── */

.user-cards {
  display: grid;
  gap: var(--space-3);
}

.user-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  background: rgba(15, 23, 42, 0.6);
  display: grid;
  gap: var(--space-3);
}

.user-card-info {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.login-inline {
  display: flex;
  gap: var(--space-2);
  align-items: center;
}

.pin-input {
  max-width: 120px;
  padding: 0.55rem 0.7rem;
  font-size: 0.9rem;
}

/* ── Hero ── */

.hero, .panel, .card, .stat-card {
  border: 1px solid var(--border);
  background: linear-gradient(170deg, rgba(17, 31, 61, 0.85) 0%, rgba(15, 23, 42, 0.96) 100%);
  box-shadow: var(--shadow);
}

.hero {
  border-radius: var(--radius-lg);
  padding: clamp(var(--space-5), 4vw, var(--space-7));
  position: relative;
  overflow: hidden;
}

.hero-top {
  display: flex;
  justify-content: space-between;
  gap: var(--space-3);
  align-items: start;
  flex-wrap: wrap;
}

.locale-control {
  display: grid;
  gap: var(--space-1);
  min-width: 170px;
}

.locale-control span {
  color: var(--text-muted);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.hero::after {
  content: '';
  position: absolute;
  width: 260px;
  height: 260px;
  right: -60px;
  top: -70px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(65, 209, 255, 0.22), transparent 65%);
}

.eyebrow {
  margin: 0 0 var(--space-2);
  color: var(--brand);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.8rem;
}

.hero-title {
  font-family: 'Manrope', sans-serif;
  font-size: clamp(1.85rem, 4vw, 3rem);
  line-height: 1.15;
  margin: 0;
  max-width: 18ch;
}

.hero-copy {
  color: var(--text-muted);
  max-width: 65ch;
  margin: var(--space-4) 0 var(--space-5);
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
}

/* ── Buttons ── */

.btn {
  border: none;
  border-radius: var(--radius-md);
  padding: 0.8rem 1.05rem;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
}

.btn:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--brand);
  outline-offset: 2px;
}

.btn:hover { transform: translateY(-2px); }

.btn-primary { background: var(--brand); color: #022530; }
.btn-primary:hover { background: var(--brand-strong); }

.btn-secondary { background: #0d2747; color: var(--text); border: 1px solid #2f4f7d; }

.btn-danger { background: #391818; color: #ffd0d0; border: 1px solid #8f3232; }

.btn-sm {
  padding: 0.55rem 0.85rem;
  font-size: 0.85rem;
  min-height: 38px;
  flex-shrink: 0;
}

/* ── Panels ── */

.panel {
  border-radius: var(--radius-lg);
  padding: clamp(var(--space-4), 2.5vw, var(--space-6));
  animation: fade-slide 380ms ease;
}

.panel-title-wrap h2 {
  margin: 0;
  font-family: 'Manrope', sans-serif;
  font-size: 1.55rem;
}

.panel-title-wrap p {
  margin: var(--space-2) 0 var(--space-5);
  color: var(--text-muted);
}

/* ── Form ── */

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-4);
}

.field { display: grid; gap: var(--space-2); }

.field span, .field legend, .filters label {
  color: var(--text-muted);
  font-size: 0.88rem;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  border: 1px solid #35568f;
  background: var(--surface);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.75rem;
  font: inherit;
}

input[type='range'] { padding-inline: 0; }

fieldset { margin: 0; border: none; padding: 0; }

.switch-wrap, .radio-group { display: flex; align-items: center; gap: var(--space-3); }
.radio-group label, .switch-wrap span { color: var(--text); }
.switch-field { align-content: end; }
.field-full { grid-column: 1 / -1; }

.actions-row { display: flex; flex-wrap: wrap; gap: var(--space-3); }

.status-message { margin: 0; font-weight: 600; }
.status-message.success { color: #96f0b8; }
.status-message.error { color: #ffc6c6; }

/* ── Dashboard ── */

.filters {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-5);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: var(--space-3);
}

.stat-card {
  border-radius: var(--radius-md);
  padding: var(--space-4);
}

.stat-card p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }
.stat-card strong { font-family: 'Manrope', sans-serif; font-size: 1.4rem; }

.dashboard-grid {
  margin-top: var(--space-4);
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-4);
}

.card-full { grid-column: 1 / -1; }

.card { border-radius: var(--radius-md); padding: var(--space-4); }

.card h3 { margin-top: 0; margin-bottom: var(--space-3); font-family: 'Manrope', sans-serif; }

.list { margin: 0; padding-left: var(--space-5); display: grid; gap: var(--space-2); }

.insight-text { margin: 0; color: var(--text); }

.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-sm);
  border: 1px solid #2b4374;
}

table { width: 100%; border-collapse: collapse; min-width: 700px; }

th, td {
  text-align: left;
  border-bottom: 1px solid #203256;
  padding: 0.7rem;
  font-size: 0.9rem;
}

thead th {
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #aac3f1;
}

/* ── Roadmap chips ── */

.roadmap h2 { margin: 0 0 var(--space-4); }

.chips { display: flex; flex-wrap: wrap; gap: var(--space-3); }

.chip {
  border: 1px solid #3c5e9e;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  background: #10223f;
}

/* ── Site & Crew Management ── */

.mgmt-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-4);
}

.mgmt-card h3 { margin-bottom: var(--space-3); }

.mgmt-add-row { display: flex; gap: var(--space-2); margin-bottom: var(--space-2); }
.mgmt-add-row input { flex: 1; min-width: 0; }

.mgmt-list {
  list-style: none;
  margin: var(--space-3) 0 0;
  padding: 0;
  display: grid;
  gap: var(--space-1);
  max-height: 340px;
  overflow-y: auto;
}

.mgmt-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid var(--border);
  font-size: 0.9rem;
}

.mgmt-item span {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.btn-remove {
  background: none;
  border: 1px solid #8f3232;
  color: #ffa0a0;
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s ease, color 0.15s ease;
}

.btn-remove:hover { background: #5c1a1a; color: #ffd0d0; }
.btn-remove:focus-visible { outline: 2px solid var(--danger); outline-offset: 2px; }

/* ── Responsive ── */

@media (max-width: 980px) {
  .page { width: min(1120px, 100% - var(--space-5)); padding: var(--space-6) 0; }

  .form-grid, .filters, .stats-grid, .dashboard-grid, .mgmt-grid {
    grid-template-columns: 1fr;
  }

  .hero-actions, .actions-row { width: 100%; }
  .hero-actions .btn, .actions-row .btn { width: 100%; }

  .user-bar { flex-direction: column; align-items: stretch; }
  .user-bar-right { justify-content: flex-end; }
}

@keyframes fade-slide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">


/* ══════════════════════════════════════════════════════
   CrewWell — User-owned data, role-based access
   ══════════════════════════════════════════════════════
   Architecture:
   - All data stored in localStorage, namespaced per user.
   - Each user authenticates locally (no server needed).
   - Workers see ONLY their own check-ins.
   - Project Managers see ALL check-ins for their project
     and can manage the dashboard, sites, and crews.
   - No data leaves the user's browser.
   ══════════════════════════════════════════════════════ */

/* ── Storage key prefixes ── */
const USERS_REGISTRY_KEY = 'crewwell.users.registry';
const SESSION_KEY = 'crewwell.session.active';

function userKey(userId, suffix) {
  return `crewwell.user.${userId}.${suffix}`;
}

/* ── Default data ── */

const DEFAULT_CREWS = [
  'Steel', 'Concrete', 'Electrical', 'Logistics', 'Scaffolding',
  'Plumbing', 'HVAC', 'Roofing', 'Painting', 'Demolition',
  'Carpentry', 'Welding', 'Heavy Equipment', 'Safety & Compliance',
  'Site Preparation',
];

const DEFAULT_SITES = ['North Yard', 'Tower A', 'West Access', 'Plant Room'];

const SUPPORTED_LOCALES = [
  { id: 'en', label: 'English' },
  { id: 'es', label: 'Español' },
  { id: 'fr', label: 'Français' },
];

/* ── Copy / i18n (abbreviated for key strings; full set below) ── */

const COPY = buildCopyTable();

/* ══════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════ */

const state = {
  currentUser: null,   // { id, displayName, role, pin }
  checkins: [],
  sites: [],
  crews: [],
  filters: { crew: 'all', site: 'all', window: 'all' },
  locale: 'en',
};

const app = document.querySelector('#app');

/* ── Boot ── */
boot();

function boot() {
  const session = loadSession();
  if (session) {
    const users = loadUsersRegistry();
    const user = users.find((u) => u.id === session.userId);
    if (user) {
      loginUser(user);
      return;
    }
  }
  renderAuthScreen();
}

/* ══════════════════════════════════════════════════════
   AUTH SCREEN
   ══════════════════════════════════════════════════════ */

function renderAuthScreen() {
  state.currentUser = null;
  clearSession();

  app.innerHTML = `
    <main class="page">
      <header class="hero">
        <p class="eyebrow">CrewWell · Site Operations Wellness</p>
        <h1 class="hero-title">Your data stays on your device. Always.</h1>
        <p class="hero-copy">
          CrewWell stores everything in your browser. No cloud, no tracking.
          Each user's check-ins and dashboards are private and isolated.
        </p>
      </header>

      <section class="panel" id="auth-panel">
        <div class="panel-title-wrap">
          <h2>Sign In or Register</h2>
          <p>Choose an existing account or create a new one. Your PIN secures your local data.</p>
        </div>

        <div id="existing-users-section"></div>

        <hr style="border-color:var(--border);margin:var(--space-5) 0;" />

        <h3 style="font-family:'Manrope',sans-serif;margin-bottom:var(--space-3);">Create New Account</h3>
        <form id="register-form" class="form-grid">
          <label class="field">
            <span>Display Name</span>
            <input id="reg-name" type="text" placeholder="e.g. Jane Foreman" required maxlength="60" autocomplete="off" />
          </label>
          <label class="field">
            <span>Role</span>
            <select id="reg-role" required>
              <option value="worker">Worker</option>
              <option value="manager">Project Manager</option>
            </select>
          </label>
          <label class="field">
            <span>PIN (4-8 digits)</span>
            <input id="reg-pin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" placeholder="••••" required autocomplete="new-password" />
          </label>
          <label class="field">
            <span>Confirm PIN</span>
            <input id="reg-pin-confirm" type="password" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" placeholder="••••" required autocomplete="new-password" />
          </label>
          <div class="field-full actions-row">
            <button class="btn btn-primary" type="submit">Create Account</button>
          </div>
          <p id="reg-status" class="status-message field-full" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel" style="text-align:center;">
        <p style="color:var(--text-muted);font-size:0.88rem;margin:0;">
          🔒 All data is stored locally in your browser's localStorage.<br/>
          Nothing is transmitted. Each user's data is isolated by account.
        </p>
      </section>
    </main>
  `;

  renderExistingUsers();
  wireUpRegister();
}

function renderExistingUsers() {
  const container = document.querySelector('#existing-users-section');
  const users = loadUsersRegistry();

  if (users.length === 0) {
    container.innerHTML = '<p style="color:var(--text-muted);">No accounts yet. Create one below.</p>';
    return;
  }

  container.innerHTML = `
    <h3 style="font-family:'Manrope',sans-serif;margin-bottom:var(--space-3);">Existing Accounts</h3>
    <div class="user-cards">
      ${users.map((u) => `
        <div class="user-card" data-user-id="${escapeAttr(u.id)}">
          <div class="user-card-info">
            <strong>${escapeHtml(u.displayName)}</strong>
            <span class="role-badge role-${u.role}">${u.role === 'manager' ? 'Project Manager' : 'Worker'}</span>
          </div>
          <form class="login-inline" data-user-id="${escapeAttr(u.id)}">
            <input type="password" inputmode="numeric" placeholder="PIN" minlength="4" maxlength="8" required autocomplete="current-password" class="pin-input" />
            <button class="btn btn-primary btn-sm" type="submit">Sign In</button>
          </form>
          <p class="login-error status-message error" style="display:none;"></p>
        </div>
      `).join('')}
    </div>
  `;

  container.querySelectorAll('.login-inline').forEach((form) => {
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const userId = form.dataset.userId;
      const pin = form.querySelector('.pin-input').value;
      const user = users.find((u) => u.id === userId);
      const errorEl = form.closest('.user-card').querySelector('.login-error');

      if (!user || !verifyPin(pin, user.pinHash)) {
        errorEl.textContent = 'Incorrect PIN.';
        errorEl.style.display = 'block';
        return;
      }

      loginUser(user);
    });
  });
}

function wireUpRegister() {
  const form = document.querySelector('#register-form');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const statusEl = document.querySelector('#reg-status');
    const name = document.querySelector('#reg-name').value.trim();
    const role = document.querySelector('#reg-role').value;
    const pin = document.querySelector('#reg-pin').value;
    const pinConfirm = document.querySelector('#reg-pin-confirm').value;

    if (!name) { setEl(statusEl, 'Enter a display name.', 'error'); return; }
    if (!/^[0-9]{4,8}$/.test(pin)) { setEl(statusEl, 'PIN must be 4-8 digits.', 'error'); return; }
    if (pin !== pinConfirm) { setEl(statusEl, 'PINs do not match.', 'error'); return; }

    const users = loadUsersRegistry();
    if (users.some((u) => u.displayName.toLowerCase() === name.toLowerCase())) {
      setEl(statusEl, 'An account with that name already exists.', 'error');
      return;
    }

    const newUser = {
      id: crypto.randomUUID(),
      displayName: name,
      role,
      pinHash: hashPin(pin),
      createdAt: new Date().toISOString(),
    };

    users.push(newUser);
    saveUsersRegistry(users);

    // Initialize user-owned data
    saveUserData(newUser.id, 'checkins', []);
    saveUserData(newUser.id, 'sites', [...DEFAULT_SITES]);
    saveUserData(newUser.id, 'crews', [...DEFAULT_CREWS]);
    saveUserData(newUser.id, 'locale', 'en');

    loginUser(newUser);
  });
}

/* ── Login ── */

function loginUser(user) {
  state.currentUser = user;
  state.locale = loadUserData(user.id, 'locale') || 'en';
  state.sites = loadUserData(user.id, 'sites') || [...DEFAULT_SITES];
  state.crews = loadUserData(user.id, 'crews') || [...DEFAULT_CREWS];
  state.filters = { crew: 'all', site: 'all', window: 'all' };

  // Load check-ins scoped to this user's role:
  if (user.role === 'manager') {
    // Manager sees ALL check-ins across all users
    state.checkins = loadAllCheckins();
  } else {
    // Worker sees ONLY their own check-ins
    state.checkins = loadUserData(user.id, 'checkins') || [];
  }

  saveSession({ userId: user.id });
  renderApp();
}

function logoutUser() {
  state.currentUser = null;
  clearSession();
  renderAuthScreen();
}

/* ══════════════════════════════════════════════════════
   MAIN APP RENDER
   ══════════════════════════════════════════════════════ */

function renderApp() {
  const user = state.currentUser;
  if (!user) { renderAuthScreen(); return; }

  // Reload check-ins on every render to pick up fresh data
  if (user.role === 'manager') {
    state.checkins = loadAllCheckins();
  } else {
    state.checkins = loadUserData(user.id, 'checkins') || [];
  }

  app.innerHTML = renderLayout();
  wireUpLocale();
  wireUpUserBar();
  wireUpForm();
  wireUpFilters();
  if (user.role === 'manager') {
    wireUpSiteManagement();
  }
  refreshDashboard();
}

function renderLayout() {
  const user = state.currentUser;
  const isManager = user.role === 'manager';
  const localeOptions = SUPPORTED_LOCALES.map(
    (item) => `<option value="${item.id}" ${state.locale === item.id ? 'selected' : ''}>${item.label}</option>`,
  ).join('');

  const crewOptions = state.crews.slice().sort()
    .map((crew) => `<option value="${crew}">${crew}</option>`).join('');
  const siteOptions = state.sites.slice().sort()
    .map((site) => `<option value="${site}">${site}</option>`).join('');

  return `
    <main class="page">

  const checkins = state.checkins;
  const rows = checkins.slice(0, 20).map((item) => `

/* ══════════════════════════════════════════════════════
   WIRE-UP FUNCTIONS
   ══════════════════════════════════════════════════════ */

function wireUpUserBar() {
  document.querySelector('#logout-btn').addEventListener('click', logoutUser);
}

function wireUpLocale() {
  const localeSelect = document.querySelector('#locale-select');
  localeSelect.addEventListener('change', (e) => {
    const value = String(e.target.value || 'en');
    state.locale = COPY[value] ? value : 'en';
    saveUserData(state.currentUser.id, 'locale', state.locale);
    renderApp();
  });
}

function wireUpForm() {
  const form = document.querySelector('#checkin-form');
  const anonymousToggle = document.querySelector('#anonymous-toggle');
  const workerNameInput = document.querySelector('#worker-name');
  const resetButton = document.querySelector('#reset-data');
  const user = state.currentUser;
  const isManager = user.role === 'manager';

  if (anonymousToggle) {
    anonymousToggle.addEventListener('change', () => {
      workerNameInput.disabled = anonymousToggle.checked;
      workerNameInput.required = !anonymousToggle.checked;
      if (anonymousToggle.checked) workerNameInput.value = '';
    });
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    const anonymous = anonymousToggle ? anonymousToggle.checked : false;
    const checkin = {
      id: crypto.randomUUID(),
      timestamp: new Date().toISOString(),
      ownerId: user.id,                      // ← data ownership tag
      ownerName: user.displayName,
      workerName: anonymous ? 'Anonymous' : String(formData.get('workerName') || '').trim(),
      anonymous,
      crew: String(formData.get('crew') || ''),
      site: String(formData.get('site') || ''),
      stress: Number(formData.get('stress') || 1),
      fatigue: Number(formData.get('fatigue') || 1),
      safetyReady: String(formData.get('safetyReady') || 'yes'),
      incidentRecent: String(formData.get('incidentRecent') || 'no'),
      notes: String(formData.get('notes') || '').trim(),
    };

    if (!checkin.crew || !checkin.site || (!anonymous && !checkin.workerName)) {
      setStatus(t('statusRequiredFields'), 'error');
      return;
    }

    // Save check-in to the SUBMITTING user's own storage
    const userCheckins = loadUserData(user.id, 'checkins') || [];
    userCheckins.unshift(checkin);
    saveUserData(user.id, 'checkins', userCheckins);

    // Update in-memory state
    state.checkins = isManager ? loadAllCheckins() : userCheckins;

    form.reset();
    if (anonymousToggle) { anonymousToggle.checked = false; }
    workerNameInput.disabled = false;
    workerNameInput.value = user.displayName;
    document.querySelector('#stress').value = '2';
    document.querySelector('#fatigue').value = '2';
    setStatus(t('statusSaved'), 'success');
    refreshDashboard();
  });

  if (resetButton) {
    resetButton.addEventListener('click', () => {
      if (!confirm('This will clear ALL check-in data for your account. Continue?')) return;
      saveUserData(user.id, 'checkins', []);
      state.checkins = user.role === 'manager' ? loadAllCheckins() : [];
      setStatus(t('statusReset'), 'success');
      refreshDashboard();
    });
  }
}

function wireUpFilters() {
  const filterCrew = document.querySelector('#filter-crew');
  const filterSite = document.querySelector('#filter-site');
  const filterWindow = document.querySelector('#filter-window');
  if (!filterCrew) return; // worker view has no filters

  filterCrew.addEventListener('change', (e) => { state.filters.crew = e.target.value; refreshDashboard(); });
  filterSite.addEventListener('change', (e) => { state.filters.site = e.target.value; refreshDashboard(); });
  filterWindow.addEventListener('change', (e) => { state.filters.window = e.target.value; refreshDashboard(); });
}

function wireUpSiteManagement() {
  const addSiteBtn = document.querySelector('#add-site-btn');
  const addCrewBtn = document.querySelector('#add-crew-btn');
  const newSiteInput = document.querySelector('#new-site-name');
  const newCrewInput = document.querySelector('#new-crew-name');
  const restoreBtn = document.querySelector('#restore-defaults-btn');
  if (!addSiteBtn) return;

  renderMgmtLists();

  addSiteBtn.addEventListener('click', () => {
    const name = newSiteInput.value.trim();
    if (!name) { setMgmtStatus('site', t('emptyName'), 'error'); return; }
    if (state.sites.some((s) => s.toLowerCase() === name.toLowerCase())) {
      setMgmtStatus('site', t('duplicateEntry'), 'error'); return;
    }
    state.sites.push(name);
    saveUserData(state.currentUser.id, 'sites', state.sites);
    newSiteInput.value = '';
    setMgmtStatus('site', t('siteAdded'), 'success');
    renderApp();
  });

  newSiteInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addSiteBtn.click(); }
  });

  addCrewBtn.addEventListener('click', () => {
    const name = newCrewInput.value.trim();
    if (!name) { setMgmtStatus('crew', t('emptyName'), 'error'); return; }
    if (state.crews.some((c) => c.toLowerCase() === name.toLowerCase())) {
      setMgmtStatus('crew', t('duplicateEntry'), 'error'); return;
    }
    state.crews.push(name);
    saveUserData(state.currentUser.id, 'crews', state.crews);
    newCrewInput.value = '';
    setMgmtStatus('crew', t('crewAdded'), 'success');
    renderApp();
  });

  newCrewInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addCrewBtn.click(); }
  });

  restoreBtn.addEventListener('click', () => {
    state.sites = [...DEFAULT_SITES];
    state.crews = [...DEFAULT_CREWS];
    saveUserData(state.currentUser.id, 'sites', state.sites);
    saveUserData(state.currentUser.id, 'crews', state.crews);
    renderApp();
  });
}

function renderMgmtLists() {
  const sitesList = document.querySelector('#sites-list');
  const crewsList = document.querySelector('#crews-list');
  if (!sitesList) return;

  sitesList.innerHTML = state.sites.slice().sort().map(
    (site) => `<li class="mgmt-item"><span>${escapeHtml(site)}</span><button class="btn-remove" data-type="site" data-name="${escapeAttr(site)}" title="${t('remove')}">&times;</button></li>`,
  ).join('');

  crewsList.innerHTML = state.crews.slice().sort().map(
    (crew) => `<li class="mgmt-item"><span>${escapeHtml(crew)}</span><button class="btn-remove" data-type="crew" data-name="${escapeAttr(crew)}" title="${t('remove')}">&times;</button></li>`,
  ).join('');

  sitesList.querySelectorAll('.btn-remove').forEach((btn) => {
    btn.addEventListener('click', () => {
      if (!confirm(t('confirmRemoveSite'))) return;
      state.sites = state.sites.filter((s) => s !== btn.dataset.name);
      saveUserData(state.currentUser.id, 'sites', state.sites);
      renderApp();
    });
  });

  crewsList.querySelectorAll('.btn-remove').forEach((btn) => {
    btn.addEventListener('click', () => {
      if (!confirm(t('confirmRemoveCrew'))) return;
      state.crews = state.crews.filter((c) => c !== btn.dataset.name);
      saveUserData(state.currentUser.id, 'crews', state.crews);
      renderApp();
    });
  });
}

/* ══════════════════════════════════════════════════════
   DASHBOARD (manager-only rendering)
   ══════════════════════════════════════════════════════ */

function refreshDashboard() {
  if (state.currentUser.role !== 'manager') return;

  const filtered = getFilteredCheckins();
  populateFilterOptions();
  renderStats(filtered);
  renderAlerts(filtered);
  renderRecommendations(filtered);
  renderSupervisorNudges(filtered);
  renderIncidentCorrelation(filtered);
  renderReferrals(filtered);
  renderTable(filtered);
}

function populateFilterOptions() {
  const crewSelect = document.querySelector('#filter-crew');
  const siteSelect = document.querySelector('#filter-site');
  if (!crewSelect) return;

  const crews = [...new Set([...state.crews, ...state.checkins.map((i) => i.crew)])].filter(Boolean).sort();
  const sites = [...new Set([...state.sites, ...state.checkins.map((i) => i.site)])].filter(Boolean).sort();

  crewSelect.innerHTML = `<option value="all">${t('allCrews')}</option>${crews.map((c) => `<option value="${c}">${c}</option>`).join('')}`;
  siteSelect.innerHTML = `<option value="all">${t('allSites')}</option>${sites.map((s) => `<option value="${s}">${s}</option>`).join('')}`;
  crewSelect.value = state.filters.crew;
  siteSelect.value = state.filters.site;
  document.querySelector('#filter-window').value = state.filters.window;
}

function getFilteredCheckins() {
  const now = Date.now();
  const days = Number(state.filters.window);
  const minTime = Number.isFinite(days) && days > 0 ? now - days * 86400000 : null;

  return state.checkins.filter((item) => {
    const matchesCrew = state.filters.crew === 'all' || item.crew === state.filters.crew;
    const matchesSite = state.filters.site === 'all' || item.site === state.filters.site;
    const matchesWindow = minTime === null || new Date(item.timestamp).getTime() >= minTime;
    return matchesCrew && matchesSite && matchesWindow;
  });
}

function renderStats(checkins) {
  const el = document.querySelector('#stats');
  if (!el) return;
  const avgStress = average(checkins.map((i) => i.stress));
  const avgFatigue = average(checkins.map((i) => i.fatigue));
  const highRisk = checkins.filter((i) => i.stress >= 4 || i.fatigue >= 4 || i.safetyReady === 'no').length;
  const readiness = checkins.length === 0 ? 0 : Math.round((checkins.filter((i) => i.safetyReady === 'yes').length / checkins.length) * 100);
  const incidents = checkins.filter((i) => i.incidentRecent === 'yes').length;

  const stats = [
    { label: t('totalCheckIns'), value: checkins.length },
    { label: t('avgStress'), value: avgStress.toFixed(1) },
    { label: t('avgFatigue'), value: avgFatigue.toFixed(1) },
    { label: t('safetyReadyRate'), value: `${readiness}%` },
    { label: t('highRiskEntries'), value: highRisk },
    { label: t('incidentFlags'), value: incidents },
  ];

  el.innerHTML = stats.map((s) => `<article class="stat-card"><p>${s.label}</p><strong>${s.value}</strong></article>`).join('');
}

function renderAlerts(checkins) {
  const list = document.querySelector('#alerts-list');
  if (!list) return;
  if (checkins.length === 0) { list.innerHTML = `<li>${t('emptyCheckins')}</li>`; return; }

  const sorted = [...checkins].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const latest = sorted.slice(0, 3);
  const previous = sorted.slice(3, 6);
  const alerts = [];

  if (previous.length > 0 && average(latest.map((i) => i.stress)) - average(previous.map((i) => i.stress)) >= 0.8)
    alerts.push(t('alertStressRise'));
  if (previous.length > 0 && average(latest.map((i) => i.fatigue)) - average(previous.map((i) => i.fatigue)) >= 0.8)
    alerts.push(t('alertFatigueRise'));
  if (latest.some((i) => i.safetyReady === 'no'))
    alerts.push(t('alertSafetyNo'));
  if (alerts.length === 0)
    alerts.push(t('noCriticalAlerts'));

  list.innerHTML = alerts.map((a) => `<li>${a}</li>`).join('');
}

function renderRecommendations(checkins) {
  const el = document.querySelector('#reco-list');
  if (!el) return;
  const recos = [];
  if (average(checkins.map((i) => i.stress)) >= 3.5) recos.push(t('recoStress'));
  if (average(checkins.map((i) => i.fatigue)) >= 3.5) recos.push(t('recoFatigue'));
  if (checkins.some((i) => i.safetyReady === 'no')) recos.push(t('recoSafety'));
  if (checkins.length < 5) recos.push(t('recoParticipation'));
  if (recos.length === 0) recos.push(t('recoMaintain'));
  el.innerHTML = recos.map((r) => `<li>${r}</li>`).join('');
}

function renderSupervisorNudges(checkins) {
  const list = document.querySelector('#nudge-list');
  if (!list) return;
  if (checkins.length === 0) { list.innerHTML = `<li>${t('emptyCheckins')}</li>`; return; }

  const nudges = [];
  if (checkins.filter((i) => isHighRisk(i)).length >= 2) nudges.push(t('nudgeRapid'));
  if (checkins.some((i) => i.incidentRecent === 'yes')) nudges.push(t('nudgeIncident'));
  if (checkins.filter((i) => i.anonymous).length / checkins.length >= 0.6) nudges.push(t('nudgeTrust'));
  if (checkins.length < 8) nudges.push(t('nudgeCoverage'));
  if (nudges.length === 0) nudges.push(t('nudgeSteady'));
  list.innerHTML = nudges.map((n) => `<li>${n}</li>`).join('');
}

function renderIncidentCorrelation(checkins) {
  const el = document.querySelector('#incident-correlation');
  if (!el) return;
  if (checkins.length === 0) { el.textContent = t('emptyCheckins'); return; }

  const wi = checkins.filter((i) => i.incidentRecent === 'yes');
  const wo = checkins.filter((i) => i.incidentRecent !== 'yes');
  if (wi.length === 0) { el.textContent = t('incidentNoSignals'); return; }

  const withRate = percentage(wi.filter((i) => isHighRisk(i)).length, wi.length);
  const withoutRate = percentage(wo.filter((i) => isHighRisk(i)).length, wo.length || 1);
  const delta = Math.round(withRate - withoutRate);

  if (delta >= 10)
    el.textContent = formatCopy('incidentHigherRisk', { diff: String(Math.abs(delta)), withRate: String(withRate), withoutRate: String(withoutRate) });
  else if (delta <= -10)
    el.textContent = formatCopy('incidentLowerRisk', { diff: String(Math.abs(delta)), withRate: String(withRate), withoutRate: String(withoutRate) });
  else
    el.textContent = formatCopy('incidentNeutral', { withRate: String(withRate), withoutRate: String(withoutRate) });
}

function renderReferrals(checkins) {
  const list = document.querySelector('#referral-list');
  if (!list) return;
  if (checkins.length === 0) { list.innerHTML = `<li>${t('noReferrals')}</li>`; return; }

  const refs = [];
  if (average(checkins.map((i) => i.stress)) >= 3.5) refs.push(t('referralEap'));
  if (average(checkins.map((i) => i.fatigue)) >= 3.5) refs.push(t('referralFatigue'));
  if (checkins.some((i) => i.incidentRecent === 'yes') || checkins.some((i) => i.safetyReady === 'no'))
    refs.push(t('referralSafety'));
  if (refs.length === 0) refs.push(t('referralPreventive'));
  list.innerHTML = refs.map((r) => `<li>${r}</li>`).join('');
}

function renderTable(checkins) {
  const tbody = document.querySelector('#checkins-table');
  if (!tbody) return;
  const rows = checkins.slice(0, 12).map((item) => `
    <tr>
      <td>${new Date(item.timestamp).toLocaleString()}</td>
      <td>${escapeHtml(item.crew)}</td>
      <td>${escapeHtml(item.site)}</td>
      <td>${escapeHtml(item.workerName)}</td>
      <td>${item.stress}</td>
      <td>${item.fatigue}</td>
      <td>${item.safetyReady === 'yes' ? t('ready') : t('notReady')}</td>
      <td>${item.incidentRecent === 'yes' ? t('recorded') : t('none')}</td>
    </tr>
  `).join('');
  tbody.innerHTML = rows || `<tr><td colspan="8">${t('emptyTable')}</td></tr>`;
}

/* ══════════════════════════════════════════════════════
   DATA PERSISTENCE — ALL LOCAL, USER-NAMESPACED
   ══════════════════════════════════════════════════════ */

function saveUserData(userId, key, value) {
  try { localStorage.setItem(userKey(userId, key), JSON.stringify(value)); } catch { /* quota */ }
}

function loadUserData(userId, key) {
  try {
    const raw = localStorage.getItem(userKey(userId, key));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function loadAllCheckins() {
  // Manager aggregation: scan all registered users' check-ins
  const users = loadUsersRegistry();
  const all = [];
  for (const u of users) {
    const checkins = loadUserData(u.id, 'checkins');
    if (Array.isArray(checkins)) {
      all.push(...checkins.map((c) => normalizeCheckin(c)));
    }
  }
  // Sort newest first
  all.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  return all;
}

/* ── Users registry (shared, not user-namespaced) ── */

function loadUsersRegistry() {
  try {
    const raw = localStorage.getItem(USERS_REGISTRY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveUsersRegistry(users) {
  localStorage.setItem(USERS_REGISTRY_KEY, JSON.stringify(users));
}

/* ── Session ── */

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveSession(session) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

/* ── PIN hashing (simple local-only hash, not crypto-grade) ── */

function hashPin(pin) {
  // Simple deterministic hash for local PIN verification.
  // This is NOT meant for server-side security — all data is local.
  let hash = 0;
  const salted = 'crewwell:' + pin + ':local';
  for (let i = 0; i < salted.length; i++) {
    const char = salted.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return String(hash);
}

function verifyPin(pin, storedHash) {
  return hashPin(pin) === storedHash;
}

/* ── Normalize ── */

function normalizeCheckin(item) {
  return {
    id: String(item.id || crypto.randomUUID()),
    timestamp: item.timestamp ? new Date(item.timestamp).toISOString() : new Date().toISOString(),
    ownerId: String(item.ownerId || ''),
    ownerName: String(item.ownerName || ''),
    workerName: String(item.workerName || 'Anonymous'),
    anonymous: Boolean(item.anonymous),
    crew: String(item.crew || ''),
    site: String(item.site || ''),
    stress: Number(item.stress || 1),
    fatigue: Number(item.fatigue || 1),
    safetyReady: item.safetyReady === 'no' ? 'no' : 'yes',
    incidentRecent: item.incidentRecent === 'yes' ? 'yes' : 'no',
    notes: String(item.notes || ''),
  };
}

/* ══════════════════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════════════════ */

function setStatus(message, type) {
  const el = document.querySelector('#status-message');
  if (el) { el.textContent = message; el.className = `status-message ${type}`; }
}

function setMgmtStatus(type, message, cls) {
  const el = document.querySelector(`#${type}-mgmt-status`);
  if (el) { el.textContent = message; el.className = `status-message ${cls}`; }
}

function setEl(el, message, cls) {
  if (el) { el.textContent = message; el.className = `status-message ${cls}`; }
}

function average(values) {
  return values.length === 0 ? 0 : values.reduce((s, v) => s + v, 0) / values.length;
}

function percentage(count, total) {
  return total ? Math.round((count / total) * 100) : 0;
}

function isHighRisk(item) {
  return item.stress >= 4 || item.fatigue >= 4 || item.safetyReady === 'no';
}

function t(key) {
  return (COPY[state.locale] || COPY.en)[key] || COPY.en[key] || key;
}

function formatCopy(key, vars) {
  return t(key).replace(/\{([a-zA-Z]+)\}/g, (m, token) => (token in vars ? vars[token] : m));
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
